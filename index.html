<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <style>
        :root {
            color: #f4f4f8;
            background: #020204;
            font-family: 'Inter', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(129, 32, 255, 0.18), transparent 18%),
                        radial-gradient(circle at bottom right, rgba(9, 182, 255, 0.14), transparent 22%),
                        #020204;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: absolute;
            width: 680px;
            height: 680px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            pointer-events: none;
        }

        body::before {
            top: -240px;
            left: -180px;
            background: #7f45ff;
            animation: float 18s ease-in-out infinite;
        }

        body::after {
            bottom: -260px;
            right: -160px;
            background: #06c9ff;
            animation: float 22s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(28px, -32px); }
        }

        main {
            position: relative;
            width: min(1160px, 100%);
            padding: 2.5rem 2rem 3rem;
            background: rgba(12, 12, 16, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        main::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 38%, rgba(255,255,255,0.06));
            pointer-events: none;
        }

        header {
            position: relative;
            z-index: 1;
        }

        h1 {
            margin: 0;
            font-size: clamp(3rem, 5vw, 5rem);
            letter-spacing: -0.04em;
            line-height: 1;
            text-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        }

        .description {
            margin: 1rem auto 0;
            max-width: 720px;
            color: #b8b8c2;
            font-size: 1rem;
            line-height: 1.75;
            letter-spacing: 0.01em;
        }

        .profiles {
            position: relative;
            z-index: 1;
            margin: 3rem auto 0;
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 1.2rem;
        }

        .profile {
            display: grid;
            place-items: center;
            gap: 1rem;
            padding: 1.1rem;
            min-height: 280px;
            background: rgba(15, 15, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .profile:hover {
            transform: translateY(-12px);
            border-color: rgba(32, 209, 255, 0.7);
            box-shadow: 0 28px 80px rgba(6, 201, 255, 0.18);
        }

        .profile::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(32, 209, 255, 0.08), rgba(126, 75, 255, 0.08));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .profile:hover::before {
            opacity: 1;
        }

        .profile img {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 22px;
            object-fit: cover;
            filter: saturate(1.05);
        }

        .profile-name {
            font-size: 1rem;
            font-weight: 700;
            color: #eff0ff;
            text-transform: capitalize;
        }

        .actions {
            position: relative;
            z-index: 1;
            margin-top: 3rem;
            display: flex;
            justify-content: center;
        }

        .manage-button {
            padding: 1rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            color: #f7f7fb;
            font-size: 0.95rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease, border-color 0.3s ease;
        }

        .manage-button:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(32, 209, 255, 0.55);
            transform: translateY(-2px);
        }

        @media (max-width: 1080px) {
            .profiles {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        @media (max-width: 850px) {
            main {
                padding: 2rem 1.5rem 2.5rem;
            }

            .profiles {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .profiles {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 520px) {
            .profiles {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
            <p class="description">Escolha seu perfil e entre em um mundo escuro, moderno e cheio de movimento.</p>
        </header>
        <section class="profiles" aria-label="Seleção de perfil">
            <article class="profile" role="button" tabindex="0" aria-label="Selecionar Marcos">
                <img src="https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif" alt="Marcos" />
                <div class="profile-name">Marcos</div>
            </article>
            <article class="profile" role="button" tabindex="0" aria-label="Selecionar Isa">
                <img src="https://media.giphy.com/media/3o7aCSPqXE5C0Yv0Zy/giphy.gif" alt="Isa" />
                <div class="profile-name">Isa 💜</div>
            </article>
            <article class="profile" role="button" tabindex="0" aria-label="Selecionar Juzinha">
                <img src="https://media.giphy.com/media/26AHG5KGFxSkUWw1i/giphy.gif" alt="Juzinha" />
                <div class="profile-name">Juzinha</div>
            </article>
            <article class="profile" role="button" tabindex="0" aria-label="Selecionar Lala">
                <img src="https://media.giphy.com/media/l0MYC0LajbaPoEADu/giphy.gif" alt="Lala" />
                <div class="profile-name">Lala</div>
            </article>
            <article class="profile" role="button" tabindex="0" aria-label="Selecionar Davi">
                <img src="https://media.giphy.com/media/2whBbi2Q1ImwU/giphy.gif" alt="Davi" />
                <div class="profile-name">Davi</div>
            </article>
        </section>
        <div class="actions">
            <button class="manage-button" type="button">Gerenciar perfis</button>
        </div>
    </main>
</body>
</html>
