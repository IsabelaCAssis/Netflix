<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
</head>
<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>

        <section class="profiles" aria-label="Seleção de perfil">
            <article class="profile" role="button" tabindex="0" aria-label="Selecionar Perfil 1">
                <figure>
                    <img src="assets/perfil1.jpg" alt="Avatar do Perfil 1" />
                    <figcaption>Perfil 1</figcaption>
                </figure>
            </article>

            <article class="profile" role="button" tabindex="0" aria-label="Selecionar Perfil 2">
                <figure>
                    <img src="assets/perfil2.jpg" alt="Avatar do Perfil 2" />
                    <figcaption>Perfil 2</figcaption>
                </figure>
            </article>

            <article class="profile" role="button" tabindex="0" aria-label="Selecionar Perfil 3">
                <figure>
                    <img src="assets/perfil3.jpg" alt="Avatar do Perfil 3" />
                    <figcaption>Perfil 3</figcaption>
                </figure>
            </article>

            <article class="profile" role="button" tabindex="0" aria-label="Selecionar Perfil 4">
                <figure>
                    <img src="assets/perfil4.jpg" alt="Avatar do Perfil 4" />
                    <figcaption>Perfil 4</figcaption>
                </figure>
            </article>
        </section>

        <footer>
            <p>Netflix clone - Escolha um perfil para continuar.</p>
        </footer>
    </main>
</body>
</html>
